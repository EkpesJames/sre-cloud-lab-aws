name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cloud-lab

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint with ruff
        run: ruff check api-gateway/gateway.py --select E,F,W --ignore E501
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ERROR_RATE: "0.0"
          APP_LATENCY_SECONDS: "0.0"
          JAEGER_ENDPOINT: "http://localhost:4317"
          PYTHONPATH: "api-gateway"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            tests/
          if-no-files-found: warn

  # ── Job 2: Build & Scan ──────────────────────────────────────────────────────
  build:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      # ── Force image name to lowercase — GHCR requirement ──────────────────
      - name: Set lowercase image name
        id: image
        run: |
          echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: false
          load: true
          tags: ${{ steps.image.outputs.name }}:scan-target
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}:scan-target
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Build and push image
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: api-gateway/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image details
        run: |
          echo "Image: ${{ steps.image.outputs.name }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  # ── Job 3: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to k3s
    runs-on: self-hosted
    needs: build
    if: false
    # if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: |
          echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: tag
        run: echo "SHA_TAG=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Pull image into k3s containerd
        run: |
          sudo k3s ctr images pull \
            --user ${{ github.actor }}:${{ secrets.PAT_TOKEN }} \
            ${{ steps.image.outputs.name }}:${{ steps.tag.outputs.SHA_TAG }} || true

      - name: Update deployment image
        run: |
          kubectl set image deployment/cloud-lab \
            cloud-lab=${{ steps.image.outputs.name }}:${{ steps.tag.outputs.SHA_TAG }} \
            -n app

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/cloud-lab \
            -n app \
            --timeout=120s

      - name: Verify deployment health
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=cloud-lab \
            -n app \
            --timeout=60s
          echo "Deployment successful"
          kubectl get pods -n app

      - name: Notify Slack on success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"✅ Deployment successful — ${{ github.sha }}\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                  {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Message\", \"value\": \"${{ github.event.head_commit.message }}\"}
                ]
              }]
            }"

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ Deployment failed — ${{ github.sha }}\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}
                ]
              }]
            }"
