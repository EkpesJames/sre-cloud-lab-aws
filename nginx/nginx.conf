upstream cloud_lab_backend {
    # Round-robin load balancing across 3 app instances
    # Nginx automatically stops sending to unhealthy instances
    server cloud-app-1:80 max_fails=3 fail_timeout=10s;
    server cloud-app-2:80 max_fails=3 fail_timeout=10s;
    server cloud-app-3:80 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name localhost;

    # Pass all traffic to the upstream pool
    location / {
        proxy_pass         http://cloud_lab_backend;
        proxy_http_version 1.1;

        # Forward real client info
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Timeout settings
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;

        # If upstream fails, try the next server
        proxy_next_upstream error timeout http_500 http_502 http_503;
    }

    # Nginx health check endpoint (for monitoring Nginx itself)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Expose upstream status (useful for debugging which instances are up)
    location /nginx-status {
        stub_status on;
        access_log  off;
    }
}
