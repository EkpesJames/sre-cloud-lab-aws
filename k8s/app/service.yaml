apiVersion: v1
kind: Service
metadata:
  name: cloud-lab
  namespace: app
  labels:
    app: cloud-lab
spec:
  # ClusterIP — internal only, used by Prometheus to scrape metrics
  type: ClusterIP
  selector:
    app: cloud-lab
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-lab-external
  namespace: app
  labels:
    app: cloud-lab
spec:
  # NodePort — exposes the app on your WSL2 host at port 30080
  # Access via: http://localhost:30080
  type: NodePort
  selector:
    app: cloud-lab
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP

