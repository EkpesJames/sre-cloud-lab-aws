global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      timeout: 5s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/recording_rules.yml

scrape_configs:

  # ── App instances (all 3) ─────────────────────────────────────────────────
  - job_name: "cloud-lab"
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets:
          - "cloud-app-1:80"
          - "cloud-app-2:80"
          - "cloud-app-3:80"
        labels:
          env: "lab"
          service: "cloud-lab-api"

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: "prometheus"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          env: "lab"
          service: "prometheus"

  # ── Alertmanager self-monitoring ──────────────────────────────────────────
  - job_name: "alertmanager"
    metrics_path: /metrics
    static_configs:
      - targets: ["alertmanager:9093"]
        labels:
          env: "lab"
          service: "alertmanager"

