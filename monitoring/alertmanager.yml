global:
  resolve_timeout: 30s

  smtp_smarthost: "${SMTP_HOST}:${SMTP_PORT}"
  smtp_from: "${SMTP_FROM}"
  smtp_auth_username: "${SMTP_USERNAME}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

# ── Inhibition rules ──────────────────────────────────────────────────────────
# Suppress warning alerts when a critical alert is already firing for the
# same service — prevents double notifications during major incidents
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - service

# ── Routing ───────────────────────────────────────────────────────────────────
route:
  receiver: "slack-alerts"
  group_by: ["alertname", "service"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h       # only re-notify every 4 hours not every minute

  routes:
    # ── Watchdog — route to null receiver (silences the noise) ────────────────
    # Watchdog is a heartbeat alert that always fires to prove alerting works
    # In production it goes to a dedicated monitoring tool, not Slack
    - match:
        alertname: Watchdog
      receiver: "null"
      repeat_interval: 24h  # if it somehow reaches here, max once per day

    # ── InfoInhibitor — internal Prometheus operator alert, suppress ──────────
    - match:
        alertname: InfoInhibitor
      receiver: "null"

    # ── Critical → Slack ──────────────────────────────────────────────────────
    - match:
        severity: critical
      receiver: "slack-alerts"
      repeat_interval: 1h

    # ── Warning → email ───────────────────────────────────────────────────────
    - match:
        severity: warning
      receiver: "email-alert"
      repeat_interval: 2h

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:
  # Null receiver — swallows alerts silently (used for Watchdog)
  - name: "null"

  - name: "slack-alerts"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "${SLACK_CHANNEL}"
        send_resolved: true
        title: "{{ if eq .Status \"firing\" }}🔴{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}"
        text: |
          *Status:* {{ .Status | toUpper }}
          *Severity:* {{ .CommonLabels.severity }}
          *Service:* {{ .CommonLabels.service }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          {{ if .CommonAnnotations.runbook }}*Runbook:* {{ .CommonAnnotations.runbook }}{{ end }}

  - name: "email-alert"
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true
        html: |
          <h3>{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}</h3>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          {{ if .CommonAnnotations.runbook }}<p><strong>Runbook:</strong> {{ .CommonAnnotations.runbook }}</p>{{ end }}
